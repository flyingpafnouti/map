<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigateur Cartographique Web</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-map-marked-alt"></i> Navigateur Cartographique Web</h1>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="resize-handle" id="resizeHandle"></div>
            <div class="controls">
                <div class="control-group">
                    <label for="mapType">Type de carte</label>
                    <select id="mapType">
                        <option value="openstreetmap">OpenStreetMap</option>
                        <option value="satellite">Vue Satellite</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="searchLocation">Recherche / Navigation</label>
                    <input type="text" id="searchLocation" placeholder="Adresse ou coordonnées (lat,lon)">
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="goToLocation()">
                        <i class="fas fa-search"></i> Aller à
                    </button>
                    <button class="btn btn-success" onclick="addWaypoint()">
                        <i class="fas fa-map-pin"></i> Ajouter Point
                    </button>
                    <button class="btn btn-info" onclick="drawPath()">
                        <i class="fas fa-route"></i> Tracer Chemin
                    </button>
                    <button class="btn btn-warning" id="headingBtn" onclick="toggleHeadingMode()">
                        <i class="fas fa-compass"></i> Mesurer Cap
                    </button>
                    <button class="btn btn-secondary" onclick="getCoordinates()">
                        <i class="fas fa-crosshairs"></i> Coordonnées
                    </button>
                    <button class="btn btn-altitude" id="altitudeBtn" onclick="toggleAltitudeMode()">
                        <i class="fas fa-mountain"></i> Altitude
                    </button>
                    <button class="btn btn-altitude" onclick="showElevationProfile()">
                        <i class="fas fa-chart-area"></i> Profil Alti
                    </button>
                    <button class="btn btn-danger" onclick="clearMap()">
                        <i class="fas fa-eraser"></i> Effacer
                    </button>
                </div>
            </div>

            <div class="info-panel">
                <div class="info-section">
                    <h3><i class="fas fa-info-circle"></i> Position Actuelle</h3>
                    <div id="currentPosition">48.024376, -1.746483</div>
                </div>

                <div class="info-section">
                    <h3><i class="fas fa-map-marker-alt"></i> Waypoints (<span id="waypointCount">0</span>)</h3>
                    <div id="waypointList"></div>
                </div>

                <div class="info-section">
                    <h3><i class="fas fa-terminal"></i> Journal</h3>
                    <div class="log" id="logPanel"></div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="exportData()">
                        <i class="fas fa-download"></i> Exporter
                    </button>
                    <button class="btn btn-secondary" onclick="importData()">
                        <i class="fas fa-upload"></i> Importer
                    </button>
                    <button class="btn btn-info" onclick="generateROS2Command()">
                        <i class="fas fa-robot"></i> ROS2 Cmd
                    </button>
                </div>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <!-- Modals -->
    <div id="waypointModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Nouveau Waypoint</div>
                <button class="close" onclick="closeModal('waypointModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="waypointName">Nom du point</label>
                    <input type="text" id="waypointName" placeholder="Nom du waypoint">
                </div>
                <div class="form-group">
                    <label for="waypointCoords">Coordonnées (optionnel)</label>
                    <input type="text" id="waypointCoords" placeholder="lat,lon ou laisser vide">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('waypointModal')">Annuler</button>
                <button class="btn btn-success" onclick="confirmAddWaypoint()">Ajouter</button>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content modal-wide">
            <div class="modal-header">
                <div class="modal-title">Profil altimétrique</div>
                <button class="close" onclick="closeModal('profileModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div id="profileStats" class="profile-stats"></div>
                <canvas id="profileChart" height="220"></canvas>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('profileModal')">Fermer</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
